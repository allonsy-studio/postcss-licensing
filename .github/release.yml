changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: "✨ Features"
      labels:
        - "feat"
    - title: "🐛 Bug Fixes"
      labels:
        - "fix"
    - title: "⚡ Performance Improvements"
      labels:
        - "perf"
    - title: "⏪ Reverts"
      labels:
        - "revert"
    - title: "📚 Documentation"
      labels:
        - "docs"
    - title: "♻️ Refactoring"
      labels:
        - "refactor"
    - title: "🔧 Maintenance"
      labels:
        - "chore"
    - title: "✅ Tests"
      labels:
        - "test"
    - title: "📦 Build System"
      labels:
        - "build"
    - title: "👷 CI"
      labels:
        - "ci"
